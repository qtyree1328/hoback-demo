<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slick Carousel Demo</title>

  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
  
  <style>
    /* ========== BASIC RESET ========== */
    body {
      margin: 0;
      padding: 50px 0;
      background-color: #f9f9f9;
      font-family: sans-serif;
    }

    /* ========== WRAPPER ========== */
    .slider-3up, .slider-3up-wrapper {
      overflow: hidden;
    }
    .slider-3up {
      position: relative;
      width: 100%;
      margin: 0;
    }
    .slider-3up--centered {
      margin: 0 auto;
    }

    /* ========== TRACK (flex row, vertically centered) ========== */
    .slider-3up--centered .slick-track {
      display: flex;
      align-items: center;       /* vertically centers different-height slides */
      padding-top: 0.2rem;
      padding-bottom: 6rem;      /* space below for dots */
    }

    /* ========== SLIDES ========== */
    .slider-3up .slick-slide {
      margin: 0 1.71429rem;      /* ~24px horizontal gap between slides */
      opacity: 0.4;              /* non-active slides are faded */
    }
    .slider-3up--centered .slick-slide {
      margin: 0 1.78571rem;      /* ~25px gap */
      position: relative;
    }
    
    /* Active slides are fully opaque */
    .slider-3up .slick-slide.slick-active {
      opacity: 1;
    }
    
    /* Smooth opacity transition */
    @media screen and (prefers-reduced-motion: no-preference) {
      .slider-3up .slick-slide {
        transition: opacity 0.2s 0.3s;
      }
    }
    
    /* Non-active slides show pointer cursor (clickable to navigate) */
    .slider-3up .slick-slide:not(.slick-active) {
      cursor: pointer;
    }

    /* ========== CARDS AND IMAGES ========== */
    .slider-3up .slick-slide .card {
      width: 100%;
      display: inline-block;
    }
    
    .slider-3up .slick-slide img {
      width: 100%;
      height: auto;
      object-fit: cover;
      border-radius: 8px; /* Added slight rounding for aesthetics */
    }

    /* ========== DOT PAGINATION (line-style) ========== */
    .slider-3up .slick-dots {
      display: flex;
      width: 50%;
      max-width: 42.1429rem;     /* ~590px */
      margin: 0 auto;
      padding: 0;
    }
    .slider-3up .slick-dots li {
      list-style: none;
      flex-basis: 100%;          /* all dots share space equally */
    }
    .slider-3up .slick-dots li button {
      width: 100%;
      border: none;
      text-indent: -9999px;      /* hides button text safely */
      height: 2rem;
      padding: 0;
      background: transparent;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    /* The "dot" is actually a thin horizontal line */
    .slider-3up .slick-dots li button::after {
      content: "";
      border-bottom: 2px solid rgb(218, 217, 215); /* Slightly thicker line for visibility */
      height: 1px;
      width: 90%; /* Slight gap between lines */
    }
    
    /* Hover/focus state */
    .slider-3up .slick-dots li button:focus::after,
    .slider-3up .slick-dots li button:hover::after {
      border-bottom-color: rgb(181, 182, 179);
    }
    
    /* Active dot */
    .slider-3up .slick-dots li.slick-active button::after {
      border-bottom-color: rgb(130, 132, 127);
      cursor: default;
    }

    /* ========== RESPONSIVE BREAKPOINTS ========== */
    @media (max-width: 768px) {
      .slider-3up--centered .slick-slide {
        margin: 0.857143rem;
      }
    }
    @media (max-width: 480px) {
      .slider-3up--centered .slick-slide {
        margin: 0.714286rem;
      }
    }
  </style>
</head>
<body>

  <div class="slider-3up slider-3up--centered">
    <div class="slick-carousel">
      
      <div class="card"><img src="https://picsum.photos/seed/1/600/400" alt="Random Image 1"></div>
      <div class="card"><img src="https://picsum.photos/seed/2/600/400" alt="Random Image 2"></div>
      <div class="card"><img src="https://picsum.photos/seed/3/600/400" alt="Random Image 3"></div>
      <div class="card"><img src="https://picsum.photos/seed/4/600/400" alt="Random Image 4"></div>
      <div class="card"><img src="https://picsum.photos/seed/5/600/400" alt="Random Image 5"></div>
      <div class="card"><img src="https://picsum.photos/seed/6/600/400" alt="Random Image 6"></div>

    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>

  <script>
    $(document).ready(function(){
      // Initialize Slick Carousel with your provided configuration
      $('.slick-carousel').slick({
        centerMode: true,
        centerPadding: '100px',
        slidesToShow: 3,
        slidesToScroll: 1,
        infinite: true,
        dots: true,
        arrows: false,
        speed: 500,
        cssEase: 'ease-in-out',
        autoplay: false,
        draggable: false, /* Set to true if you want mouse dragging */
        swipe: true,
        swipeToSlide: true,
        focusOnSelect: true, /* I changed this to true so clicking a faded slide centers it */
        pauseOnHover: true,
        pauseOnFocus: true,
        
        // Make it responsive so it doesn't break on smaller screens
        responsive: [
          {
            breakpoint: 1024,
            settings: {
              slidesToShow: 3,
              centerPadding: '60px',
            }
          },
          {
            breakpoint: 768,
            settings: {
              slidesToShow: 1, /* Drops to 1 visible slide on mobile */
              centerPadding: '80px',
            }
          }
        ]
      });
    });
  </script>

</body>
</html>
