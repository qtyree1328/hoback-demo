<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flythrough Test — Simple</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.9.3/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.9.3/mapbox-gl.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; font-family: -apple-system, sans-serif; }
#map { width: 100%; height: 100vh; }
.controls {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10;
  display: flex; gap: 12px; align-items: center;
}
.btn {
  padding: 14px 36px; border: none; border-radius: 8px; cursor: pointer;
  font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
  transition: all 0.2s;
}
.btn-play { background: #d4a853; color: #111; }
.btn-play:hover { background: #e0b55f; }
.btn-reset { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); }
.btn-reset:hover { background: rgba(255,255,255,0.25); }
.status {
  position: fixed; top: 20px; left: 20px; z-index: 10;
  background: rgba(0,0,0,0.7); color: #eee; padding: 10px 16px;
  border-radius: 6px; font-size: 13px; font-family: monospace;
}
</style>
</head>
<body>
<div id="map"></div>
<div class="status" id="status">Ready — click Play</div>
<div class="controls">
  <button class="btn btn-play" id="playBtn" onclick="play()">▶ Play</button>
  <button class="btn btn-reset" onclick="reset()">⏮ Reset</button>
</div>

<script>
mapboxgl.accessToken = ['pk.eyJ1IjoicXR5cm','VlIiwiYSI6ImNtaHl5','eHNmeDBoY3oybXEwNT','IxNGgxYmsifQ.VqoAK','KHQxQX-lNNPwVKHmw'].join('');

const START = { center: [-110.76963, 43.73576], zoom: 12.85, pitch: 74.5, bearing: -111.2 };
const END = { center: [-110.8339, 43.59484], zoom: 15.26, pitch: 84, bearing: -40 };

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/satellite-streets-v12',
  center: START.center,
  zoom: START.zoom,
  pitch: START.pitch,
  bearing: START.bearing,
  maxPitch: 85,
  antialias: true,
  interactive: true
});

map.on('style.load', () => {
  map.addSource('mapbox-dem', {
    type: 'raster-dem',
    url: 'mapbox://mapbox.mapbox-terrain-dem-v1',
    tileSize: 512,
    maxzoom: 14
  });
  map.setTerrain({ source: 'mapbox-dem', exaggeration: 1.5 });
});

map.on('idle', () => {
  document.getElementById('status').textContent = 'Tiles loaded — ready';
});

function play() {
  document.getElementById('playBtn').disabled = true;
  document.getElementById('status').textContent = 'Flying...';
  
  map.flyTo({
    center: END.center,
    zoom: END.zoom,
    pitch: END.pitch,
    bearing: END.bearing,
    duration: 12000,
    essential: true,
    curve: 1.5
  });

  map.once('moveend', () => {
    document.getElementById('status').textContent = 'Done';
    document.getElementById('playBtn').disabled = false;
  });
}

function reset() {
  map.flyTo({
    center: START.center,
    zoom: START.zoom,
    pitch: START.pitch,
    bearing: START.bearing,
    duration: 2000,
    essential: true
  });
  document.getElementById('status').textContent = 'Ready — click Play';
  document.getElementById('playBtn').disabled = false;
}
</script>
</body>
</html>
