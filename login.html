<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Login - Hoback Club</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Lato', sans-serif; color: #272f36; background: #1e2d3a; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
a { text-decoration: none; color: inherit; }
img { max-width: 100%; display: block; }

.login-container { background: #fff; border-radius: 8px; padding: 60px 50px; max-width: 420px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.login-container img { height: 60px; margin: 0 auto 40px; }
.login-container h2 { font-size: 1.2rem; font-weight: 300; color: #1e2d3a; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 30px; }
.form-group { margin-bottom: 20px; text-align: left; }
.form-group label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #1e2d3a; margin-bottom: 6px; }
.form-group input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 4px; font-family: 'Lato', sans-serif; font-size: 0.95rem; transition: border-color 0.3s; }
.form-group input:focus { outline: none; border-color: #1e2d3a; }
.submit-btn { width: 100%; padding: 14px; background: #1e2d3a; color: #fff; border: none; border-radius: 4px; font-family: 'Lato', sans-serif; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
.submit-btn:hover { background: #2a3f50; }
.back-link { display: inline-block; margin-top: 30px; font-size: 0.8rem; color: rgba(255,255,255,0.6); transition: color 0.3s; }
.back-link:hover { color: #fff; }
</style>
</head>
<body>

<div class="login-container">
  <img src="images/logo-nav.svg" alt="Hoback Club">
  <h2>Member Login</h2>
  <form onsubmit="event.preventDefault();alert('Member login is not available at this time. This is a demo site.');">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" required>
    </div>
    <button type="submit" class="submit-btn">Sign In</button>
  </form>
</div>
<a href="index.html" class="back-link">Back to Home</a>

</body>
</html>
