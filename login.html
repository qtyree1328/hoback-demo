<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Login - Hoback Club</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Lato', sans-serif;
  color: #272f36;
  background: #ede9e1;
  min-height: 100vh;
  display: flex;
  align-items: stretch;
  overflow: hidden;
}
a { text-decoration: none; color: inherit; }
img { max-width: 100%; display: block; }

/* Tan background with mountain drawing (matches index.html style) */
.login-bg {
  position: fixed;
  inset: 0;
  background: #ede9e1;
  z-index: 0;
  overflow: hidden;
}

.login-bg img {
  position: absolute;
  bottom: 0;
  left: calc((100vw + 420px) / 2);
  transform: translateX(-50%);
  width: 75vw;
  min-width: 500px;
  max-width: 1400px;
  opacity: 0.55;
  pointer-events: none;
}

/* Left panel */
.login-panel {
  position: relative;
  z-index: 1;
  width: 420px;
  min-height: 100vh;
  background: rgba(22, 35, 48, 0.94);
  backdrop-filter: blur(6px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 50px;
  flex-shrink: 0;
}

/* Shield logo in the panel */
.login-box-logo {
  height: 80px;
  width: auto;
  margin: 0 auto 10px;
}

.login-panel .subtitle {
  font-size: 0.6rem;
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: 0.3em;
  color: rgba(255,255,255,0.5);
  margin-bottom: 40px;
}

.login-panel h2 {
  font-size: 1.1rem;
  font-weight: 300;
  color: rgba(255,255,255,0.85);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 35px;
}

.form-group {
  width: 100%;
  margin-bottom: 18px;
}

.form-group input {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 3px;
  background: rgba(255,255,255,0.95);
  font-family: 'Lato', sans-serif;
  font-size: 0.85rem;
  color: #333;
  transition: border-color 0.3s;
}

.form-group input::placeholder {
  color: #888;
  font-size: 0.8rem;
}

.form-group input:focus {
  outline: none;
  border-color: rgba(255,255,255,0.6);
}

.submit-btn {
  width: 100%;
  padding: 13px;
  background: transparent;
  color: rgba(255,255,255,0.8);
  border: 1px solid rgba(255,255,255,0.35);
  font-family: 'Lato', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 8px;
}

.submit-btn:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.6);
  color: #fff;
}

.login-extras {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 20px;
}

.remember-me {
  display: flex;
  align-items: center;
  gap: 6px;
  color: rgba(255,255,255,0.5);
  font-size: 0.7rem;
  cursor: pointer;
}

.remember-me input[type="checkbox"] {
  width: 14px;
  height: 14px;
  accent-color: #1e2d3a;
}

.forgot-link {
  font-size: 0.7rem;
  color: rgba(180,210,240,0.7);
  font-style: italic;
  transition: color 0.3s;
}

.forgot-link:hover { color: rgba(180,210,240,1); }

/* Right side spacer */
.login-spacer {
  flex: 1;
  position: relative;
  z-index: 1;
}

@media (max-width: 768px) {
  .login-panel {
    width: 100%;
    min-height: 100vh;
    padding: 40px 30px;
  }
  .login-bg img {
    left: 50%;
    bottom: 0;
    width: 80vw;
  }
}
</style>
</head>
<body>

<div class="login-bg">
  <img src="images/tetons_drawing4.png" alt="">
</div>

<div class="login-panel">
  <img src="images/logo-footer.svg" alt="Hoback Club" class="login-box-logo">
  <div class="subtitle">Jackson Hole</div>
  <h2>Member Login</h2>
  <form onsubmit="event.preventDefault(); window.location.href='member.html';">
    <div class="form-group">
      <input type="text" placeholder="Username">
    </div>
    <div class="form-group">
      <input type="password" placeholder="Password">
    </div>
    <button type="submit" class="submit-btn">Sign In</button>
  </form>
  <div class="login-extras">
    <label class="remember-me">
      <input type="checkbox"> Remember Me
    </label>
    <a href="#" class="forgot-link">Forgot Password?</a>
  </div>
</div>

<div class="login-spacer"></div>

</body>
</html>
